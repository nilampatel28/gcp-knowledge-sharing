<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCP Knowledge Sharing Sessions - Deutsche Bank</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS for Animations and Theme -->
    <style>
        /* Permafrost Dark Theme Gradient */
        .permafrost-bg {
            background: linear-gradient(135deg, #020617 0%, #0f172a 40%, #082f49 100%);
        }

        /* Smooth Slide-Up Fade Animation */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Staggered Animation Delays */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }
        .delay-700 { animation-delay: 0.7s; }
    </style>
</head>
<body class="permafrost-bg min-h-screen flex items-center justify-center font-sans antialiased relative overflow-hidden selection:bg-cyan-900 selection:text-white">

    <!-- Ambient Glow Effects for Immersive Feel -->
    <div class="absolute inset-0 z-0 flex justify-center items-center pointer-events-none opacity-30">
        <div class="w-[500px] h-[500px] bg-blue-600 rounded-full blur-[150px]"></div>
        <div class="w-[400px] h-[400px] bg-cyan-500 rounded-full blur-[150px] -ml-48 mix-blend-screen"></div>
    </div>

    <!-- Main Content Container -->
    <main class="relative z-10 text-center px-6 max-w-4xl mx-auto flex flex-col items-center">
        
        <!-- Deutsche Bank Logo -->
        <div class="animate-fade-in-up delay-100 mb-10 group cursor-pointer">
            <img src="image_0.png" alt="Deutsche Bank Logo" class="h-28 w-auto transition-transform duration-500 group-hover:scale-105">
        </div>

        <!-- Corporate Accent Line -->
        <div class="animate-fade-in-up delay-200 w-16 h-1.5 bg-blue-500 rounded-full mb-8 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>

        <!-- Main Heading -->
        <h1 class="animate-fade-in-up delay-300 text-4xl md:text-5xl lg:text-6xl font-light tracking-tight text-slate-100 leading-tight mb-12">
            Welcome to <br>
            <span class="font-semibold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500 hover:from-blue-400 hover:to-cyan-300 transition-all duration-700 cursor-default">
                GCP Knowledge Sharing Sessions
            </span> 
            <br>
            <span class="text-3xl md:text-4xl text-slate-300 hover:text-slate-100 transition-colors duration-500 mt-4 block cursor-default">
                Series by
            </span>
        </h1>
        
        <!-- Speakers Section -->
        <div class="animate-fade-in-up delay-500 w-full max-w-2xl border-t border-slate-700/50 pt-8 mt-2 relative group cursor-default">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900/50 backdrop-blur-sm px-4 py-1 rounded-full border border-slate-700/50 group-hover:border-cyan-500/50 transition-colors duration-500">
                <p class="text-sm text-cyan-400 uppercase tracking-[0.2em] font-semibold group-hover:text-cyan-300 transition-colors duration-500">Speakers</p>
            </div>
            <p class="text-2xl md:text-3xl text-slate-200 font-medium tracking-wide mt-4 hover:text-white transition-colors duration-300">
                <span class="hover:text-cyan-300 transition-colors duration-300">Nilam Patel</span> 
                <span class="text-slate-500 font-light mx-3">|</span> 
                <span class="hover:text-cyan-300 transition-colors duration-300">Shital Waghmare</span>
            </p>
        </div>

        <!-- Team Name Section -->
        <div class="animate-fade-in-up delay-700 mt-8 group cursor-default">
            <div class="inline-block bg-slate-800/40 backdrop-blur-md px-6 py-2 rounded-lg border border-slate-700/50 group-hover:border-blue-500/40 group-hover:bg-slate-800/60 transition-all duration-500">
                <p class="text-lg text-slate-300 font-light tracking-wider group-hover:text-cyan-100 transition-colors duration-300">
                    Team Name: <span class="font-semibold text-blue-400 group-hover:text-cyan-300 transition-colors duration-300">PSD2CE</span>
                </p>
            </div>
        </div>

    </main>

</body>
</html>
